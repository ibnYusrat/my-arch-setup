general {
    lock_cmd = pidof hyprlock || hyprlock       # dbus/sysd lock command (for hyprlock)
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.
}

listener {
    timeout = 120
    on-timeout = hyprctl dispatch dpms off && killall -STOP mpvpaper
    on-resume = hyprctl dispatch dpms on && killall -CONT mpvpaper
}
