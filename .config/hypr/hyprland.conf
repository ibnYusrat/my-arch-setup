
# Monitor Configuration
# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=DP-2,3840x2160@60,0x0,1.5

# Auto-start services
exec-once = ~/.config/hypr/set_wallpaper.sh
exec-once = waybar
exec-once = sleep 2 && ~/.local/bin/nearby_qml_file_tray_app
exec-once = dunst
exec-once = hypridle
exec-once = nwg-dock-hyprland -x -p bottom -i 32 -mb 5 -mt 5 -c "wofi --show drun"

# Set programs
$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun

# Environment Variables
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = NEARBY_TRAY_ICON,$HOME/.local/share/icons/nearby_share.svg

# Input Configuration
input {
    kb_layout = us
    kb_options = caps:escape
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

# General Visuals
general {
    gaps_in = 15
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    allow_tearing = false
}

# Decoration (Rounding, Blur, Shadow)
decoration {
    rounding = 10
    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
    }
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# Animations
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# Layouts
dwindle {
    # pseudotile is removed or renamed in recent versions, commenting out for now
    # pseudotile = true 
    preserve_split = true
}

master {
    new_status = master
}

# Misc
misc {
    force_default_wallpaper = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

# Window Rules
# windowrulev2 = suppressevent maximize, class:.*

# Keybindings
$mainMod = SUPER

# Screenshot region to clipboard
bind = CTRL ALT SHIFT, 4, exec, grim -g "$(slurp)" - | wl-copy

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
# bind = $mainMod, J, togglesplit, # dwindle

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7

# Wallpaper modes
bind = $mainMod SHIFT, 8, exec, ~/.config/hypr/set_wallpaper.sh 1
bind = $mainMod SHIFT, 9, exec, ~/.config/hypr/set_wallpaper.sh 2
bind = $mainMod SHIFT, 0, exec, ~/.config/hypr/set_wallpaper.sh 3

# Special workspace
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
